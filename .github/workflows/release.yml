name: Release

on:
  workflow_dispatch:
  push:
    tags: ["v*"]

jobs:
  android:
    name: Build signed Android App Bundle
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Install MAUI Android workload
        run: dotnet workload install maui-android

      - name: Decode signing keystore
        env:
          KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: echo "$KEYSTORE_B64" | base64 -d > "$RUNNER_TEMP/peepoo.keystore"

      - name: Publish signed .aab
        working-directory: src/MauiApp/PeePooFinder
        env:
          KEYSTORE_PATH: ${{ runner.temp }}/peepoo.keystore
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASS: ${{ secrets.ANDROID_KEY_PASSWORD }}
          STORE_PASS: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          MAPS_KEY: ${{ secrets.MAPS_API_KEY }}
        run: >
          dotnet publish -f net10.0-android -c Release
          -p:MapsApiKey="$MAPS_KEY"
          -p:AndroidKeyStore=true
          -p:AndroidSigningKeyStore="$KEYSTORE_PATH"
          -p:AndroidSigningKeyAlias="$KEY_ALIAS"
          -p:AndroidSigningKeyPass="$KEY_PASS"
          -p:AndroidSigningStorePass="$STORE_PASS"
          -p:AndroidPackageFormat=aab

      - name: Upload App Bundle
        uses: actions/upload-artifact@v4
        with:
          name: peepoo-android-aab
          path: src/MauiApp/PeePooFinder/bin/Release/net10.0-android/**/*-Signed.aab
          if-no-files-found: error

  # iOS builds require a macOS runner plus an Apple certificate and provisioning
  # profile. Enable by setting the repository variable ENABLE_IOS to "true" and
  # adding the APPLE_* secrets. Re-add net10.0-ios to <TargetFrameworks> first.
  ios:
    name: Build signed iOS app
    if: ${{ vars.ENABLE_IOS == 'true' }}
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Install MAUI iOS workload
        run: dotnet workload install maui-ios

      - name: Import signing certificate
        env:
          CERT_P12_BASE64: ${{ secrets.APPLE_CERT_P12_BASE64 }}
          CERT_PASSWORD: ${{ secrets.APPLE_CERT_PASSWORD }}
        run: |
          echo "$CERT_P12_BASE64" | base64 -d > "$RUNNER_TEMP/cert.p12"
          security create-keychain -p "" build.keychain
          security import "$RUNNER_TEMP/cert.p12" -k build.keychain -P "$CERT_PASSWORD" -T /usr/bin/codesign
          security list-keychains -d user -s build.keychain login.keychain
          security set-keychain-settings build.keychain
          security unlock-keychain -p "" build.keychain
          security set-key-partition-list -S apple-tool:,apple: -s -k "" build.keychain

      - name: Install provisioning profile
        env:
          PROFILE_B64: ${{ secrets.APPLE_PROVISIONING_PROFILE_BASE64 }}
        run: |
          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
          echo "$PROFILE_B64" | base64 -d > "$HOME/Library/MobileDevice/Provisioning Profiles/peepoo.mobileprovision"

      - name: Publish .ipa
        working-directory: src/MauiApp/PeePooFinder
        env:
          MAPS_KEY: ${{ secrets.MAPS_API_KEY }}
          SIGN_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          SIGN_PROFILE: ${{ secrets.APPLE_PROVISIONING_PROFILE }}
        run: >
          dotnet publish -f net10.0-ios -c Release
          -p:MapsApiKey="$MAPS_KEY"
          -p:RuntimeIdentifier=ios-arm64
          -p:CodesignKey="$SIGN_IDENTITY"
          -p:CodesignProvision="$SIGN_PROFILE"

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: peepoo-ios-ipa
          path: src/MauiApp/PeePooFinder/bin/Release/net10.0-ios/**/*.ipa
          if-no-files-found: error
