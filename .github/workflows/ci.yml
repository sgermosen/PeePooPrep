name: CI

on:
  push:
    branches: [main, "claude/**"]
  pull_request:

jobs:
  backend:
    name: Backend build & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore src/PeePoo/PeePoo.sln

      - name: Build
        run: dotnet build src/PeePoo/PeePoo.sln -c Release --no-restore

      - name: Test
        run: dotnet test src/PeePoo/Tests/Tests.csproj -c Release --no-build --verbosity normal
